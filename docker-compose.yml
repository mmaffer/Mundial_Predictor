version: '3.9'

services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: predict26-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: predict26
      POSTGRES_PASSWORD: predict26pass
      POSTGRES_DB: predict26
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predict26 -d predict26"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
      target: production
    container_name: predict26-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://predict26:predict26pass@postgres:5432/predict26?schema=public
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-predict26_jwt_secret_super_seguro_2026_mundial_clave_larga}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mundial.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        # Browser calls this URL directly — must be reachable from the host
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: predict26-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

  # ─── pgAdmin (opcional, solo con --profile dev) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: predict26-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@predict26.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: predict26-network
